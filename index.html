<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Go Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .app-container { display: flex; width: 900px; max-width: 100%; height: 650px; max-height: 100vh; background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .sidebar { width: 250px; background: #f8f9fa; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { background: #0084ff; color: white; padding: 15px; font-weight: bold; text-align: center; }
        .online-list { flex: 1; overflow-y: auto; padding: 10px; }
        .online-list h3 { font-size: 14px; color: #666; margin-bottom: 10px; margin-top: 15px; }
        .user-item, .group-item { padding: 10px; background: white; margin-bottom: 5px; border-radius: 5px; display: flex; align-items: center; cursor: pointer; transition: background 0.2s; }
        .user-item:hover, .group-item:hover { background: #e9ecef; }
        .user-item.active, .group-item.active { background: #0084ff; color: white; }
        .user-item .status { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .user-item .call-btn { margin-left: auto; background: #28a745; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .group-item .icon { margin-right: 8px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .chat-header { background: #0084ff; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chat-header button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .message { margin-bottom: 10px; max-width: 70%; }
        .message .meta { font-size: 12px; color: #666; margin-bottom: 2px; }
        .message .bubble { background: #e4e6eb; padding: 10px; border-radius: 15px; word-wrap: break-word; }
        .message .bubble img { max-width: 200px; border-radius: 8px; display: block; margin-bottom: 5px; cursor: pointer; }
        .message .file-container { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 8px; margin-bottom: 5px; }
        .message .file-icon { font-size: 24px; }
        .message .file-info { display: flex; flex-direction: column; }
        .message .file-name { font-weight: bold; font-size: 13px; margin-bottom: 2px; word-break: break-all; }
        .message .file-download { color: #0084ff; text-decoration: none; font-size: 12px; }
        .message.own { align-self: flex-end; }
        .message.own .bubble { background: #0084ff; color: white; }
        .message.own .meta { text-align: right; color: #999; }
        .message.own .file-container { background: rgba(255,255,255,0.2); }
        .message.own .file-download { color: #fff; text-decoration: underline; }
        .message.system { align-self: center; max-width: 100%; }
        .message.system .bubble { background: #fff3cd; color: #856404; font-style: italic; }
        #typing_status { padding: 0 15px; color: #888; font-size: 14px; height: 20px; font-style: italic; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #ddd; align-items: center; }
        .chat-input input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; margin: 0 10px; }
        .chat-input button { border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; color: white; font-size: 16px; }
        .btn-send { background: #0084ff; }
        .btn-attach { background: #28a745; }
        
        .login-screen { position: fixed; width: 350px; max-width: 90%; background: #fff; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 40px; }
        .login-screen h2 { margin-bottom: 20px; }
        .login-screen input { padding: 10px; width: 100%; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .login-screen button { padding: 12px; width: 100%; background: #0084ff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .login-screen .toggle-link { margin-top: 10px; cursor: pointer; color: #0084ff; font-size: 14px; }
        .login-screen .error { color: red; margin-top: 10px; font-size: 14px; height: 20px; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 400px; max-width: 90%; text-align: center; }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input { padding: 10px; width: 100%; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .modal-content button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .modal-content .btn-cancel { background: #6c757d; }
        .modal-content .btn-accept { background: #28a745; }
        .modal-content .btn-reject { background: #dc3545; }

        /* Полностью адаптивное окно видеозвонка */
        .call-modal { 
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100vw - 40px);
            max-width: 700px;
            height: calc(100vh - 40px);
            max-height: 500px;
            background: #000; 
            display: flex; 
            flex-direction: column; 
            border-radius: 10px; 
            overflow: hidden;
            z-index: 300;
        }
        .video-container { 
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            min-height: 0;
        }
        .remote-video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #222;
            display: block;
        }
        .local-video { 
            position: absolute; 
            bottom: 10px; 
            right: 10px; 
            width: 100px; 
            height: 75px; 
            object-fit: cover; 
            border: 2px solid white; 
            border-radius: 8px; 
            background: #333;
            z-index: 10;
        }
        .call-controls { 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            background: #111;
            flex-shrink: 0;
        }
        .call-btn-end { 
            background: #dc3545; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 14px; 
        }
        .call-btn-switch { 
            background: #0084ff; 
            color: white; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 14px; 
        }
        
        .hidden { display: none !important; }

        /* Мобильная адаптивность */
        @media (max-width: 768px) {
            body { overflow: auto; }
            .app-container { 
                flex-direction: column; 
                width: 100%; 
                height: 100vh; 
                border-radius: 0; 
            }
            .sidebar { 
                width: 100%; 
                height: 40%; 
                border-right: none; 
                border-bottom: 1px solid #ddd; 
            }
            .chat-area { 
                height: 60%; 
            }
            .call-modal { 
                width: 100vw;
                height: 100vh;
                max-width: 100%;
                max-height: 100%;
                border-radius: 0;
                top: 0;
                left: 0;
                transform: none;
            }
            .local-video { 
                width: 80px; 
                height: 60px; 
                bottom: 5px; 
                right: 5px; 
            }
            .message { 
                max-width: 85%; 
            }
        }

        @media (max-height: 500px) {
            .call-modal {
                height: calc(100vh - 20px);
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="login-screen" id="login_screen">
        <h2 id="auth_title">Вход</h2>
        <input type="text" id="username_input" placeholder="Имя пользователя">
        <input type="password" id="password_input" placeholder="Пароль">
        <button onclick="submitAuth()" id="auth_btn">Войти</button>
        <div class="toggle-link" onclick="toggleAuthMode()">
            <span id="toggle_text">Нет аккаунта? Зарегистрироваться</span>
        </div>
        <div class="error" id="auth_error"></div>
    </div>

    <div class="app-container hidden" id="app_container">
        <div class="sidebar">
            <div class="sidebar-header">Контакты</div>
            <div class="online-list">
                <h3>Онлайн (<span id="online_count">0</span>)</h3>
                <div id="user_item_general" class="user-item active" onclick="switchToGeneral()">
                    <span class="status"></span>Общий чат
                </div>
                <div id="online_users_list"></div>
                
                <h3>Группы <button onclick="showCreateGroupModal()" style="background:#0084ff; color:white; border:none; padding:3px 8px; border-radius:3px; cursor:pointer; font-size:12px;">+</button></h3>
                <div id="groups_list"></div>
                
                <h3>Доступные группы</h3>
                <div id="available_groups_list"></div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <span id="chat_header">Общий чат</span>
                <button onclick="logout()">Выйти</button>
            </div>
            <div class="chat-messages" id="messages"></div>
            <div id="typing_status"></div>
            <div class="chat-input">
                <input type="file" id="file_input" style="display:none" onchange="handleFileSelect(event)">
                <button class="btn-attach" onclick="document.getElementById('file_input').click()" title="Прикрепить файл">📎</button>
                <input type="text" id="msg_input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()" onkeyup="handleTyping()">
                <button class="btn-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <div class="modal hidden" id="create_group_modal">
        <div class="modal-content">
            <h3>Создать группу</h3>
            <input type="text" id="group_name_input" placeholder="Название группы">
            <button onclick="createGroup()">Создать</button>
            <button class="btn-cancel" onclick="hideCreateGroupModal()">Отмена</button>
        </div>
    </div>

    <div class="modal hidden" id="incoming_call_modal">
        <div class="modal-content">
            <h3 id="incoming_call_text">Входящий звонок...</h3>
            <button class="btn-accept" onclick="acceptCall()">Принять</button>
            <button class="btn-reject" onclick="rejectCall()">Отклонить</button>
        </div>
    </div>

    <div class="modal hidden" id="active_call_modal">
        <div class="call-modal">
            <div class="video-container">
                <video id="remote_video" class="remote-video" autoplay playsinline webkit-playsinline></video>
                <video id="local_video" class="local-video" autoplay playsinline webkit-playsinline muted></video>
            </div>
            <div class="call-controls">
                <button class="call-btn-switch" onclick="switchCamera()" id="switch_camera_btn">🔄 Камера</button>
                <button class="call-btn-end" onclick="endCall()">Завершить</button>
            </div>
        </div>
    </div>

    <script>
        var socket;
        var messagesDiv = document.getElementById('messages');
        var currentUser = '';
        var currentChat = 'general';
        var currentGroupID = 0;
        var isRegisterMode = false;
        var statusDiv = document.getElementById('typing_status');
        var statusTimer;

        let localStream;
        let peerConnection;
        let currentCallTarget = '';
        let pendingCandidates = [];
        let currentFacingMode = 'user';
        const servers = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ] 
        };

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth_title').textContent = isRegisterMode ? 'Регистрация' : 'Вход';
            document.getElementById('auth_btn').textContent = isRegisterMode ? 'Зарегистрироваться' : 'Войти';
            document.getElementById('toggle_text').textContent = isRegisterMode ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться';
            document.getElementById('auth_error').textContent = '';
        }

        function submitAuth() {
            var username = document.getElementById('username_input').value.trim();
            var password = document.getElementById('password_input').value;
            var errorDiv = document.getElementById('auth_error');
            errorDiv.textContent = '';

            if (!username || !password) { errorDiv.textContent = 'Заполните все поля'; return; }

            var url = isRegisterMode ? '/register' : '/login';

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    currentUser = username;
                    localStorage.setItem('messenger_username', username);
                    document.getElementById('login_screen').classList.add('hidden');
                    document.getElementById('app_container').classList.remove('hidden');
                    connectWebSocket();
                } else {
                    errorDiv.textContent = data.message || 'Ошибка';
                }
            })
            .catch(() => { errorDiv.textContent = 'Ошибка соединения с сервером'; });
        }

        function logout() {
            localStorage.removeItem('messenger_username');
            location.reload();
        }

        function connectWebSocket() {
            var wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            var wsUrl = wsProtocol + '//' + window.location.host + '/ws';
            socket = new WebSocket(wsUrl);
            
            socket.onopen = function() {
                socket.send(JSON.stringify({ type: "register", username: currentUser }));
                loadGeneralHistory();
                loadGroups();
                loadAvailableGroups();
            };
            
            socket.onmessage = function(event) {
                var data = JSON.parse(event.data);
                
                if (data.type === "typing") {
                    statusDiv.textContent = data.username + ' печатает...';
                    clearTimeout(statusTimer);
                    statusTimer = setTimeout(function() { statusDiv.textContent = ''; }, 2000);
                    return;
                }

                if (data.type === "webrtc") {
                    handleWebRTCSignal(data);
                    return;
                }
                
                if (data.type === "message") {
                    if (currentChat === 'general') addMessageToUI(data.username, data.text, data.image, data.file_name, data.username === currentUser);
                } else if (data.type === "private") {
                    var partner = data.username === currentUser ? data.receiver : data.username;
                    if (currentChat === partner) addMessageToUI(data.username, data.text, data.image, data.file_name, data.username === currentUser);
                } else if (data.type === "group_message") {
                    if (currentChat === 'group' && currentGroupID === data.group_id) {
                        addMessageToUI(data.username, data.text, data.image, data.file_name, data.username === currentUser);
                    }
                } else if (data.type === "user_list") {
                    updateUserList(data.users);
                } else if (data.type === "system") {
                    if (currentChat === 'general') addSystemMessage(data.text);
                }
            };
        }

        window.onload = function() {
            var savedName = localStorage.getItem('messenger_username');
            if (savedName) {
                currentUser = savedName;
                document.getElementById('login_screen').classList.add('hidden');
                document.getElementById('app_container').classList.remove('hidden');
                connectWebSocket();
            }
        };

        function switchToGeneral() {
            currentChat = 'general'; currentGroupID = 0;
            document.getElementById('chat_header').textContent = 'Общий чат';
            document.querySelectorAll('.user-item, .group-item').forEach(el => el.classList.remove('active'));
            document.getElementById('user_item_general').classList.add('active');
            messagesDiv.innerHTML = '';
            loadGeneralHistory();
        }

        function switchToPrivate(username) {
            currentChat = username; currentGroupID = 0;
            document.getElementById('chat_header').textContent = 'Чат с ' + username;
            document.querySelectorAll('.user-item, .group-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            messagesDiv.innerHTML = '';
            loadPrivateHistory(username);
        }

        function switchToGroup(groupID, groupName) {
            currentChat = 'group'; currentGroupID = groupID;
            document.getElementById('chat_header').textContent = 'Группа: ' + groupName;
            document.querySelectorAll('.user-item, .group-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            messagesDiv.innerHTML = '';
            loadGroupHistory(groupID);
        }

        function loadGeneralHistory() {
            fetch('/history').then(res => res.json()).then(data => {
                if(data) data.forEach(msg => addMessageToUI(msg.username, msg.text, msg.image, msg.file_name, msg.username === currentUser));
            });
        }

        function loadPrivateHistory(partner) {
            fetch(`/private_history?user1=${currentUser}&user2=${partner}`).then(res => res.json()).then(data => {
                if(data) data.forEach(msg => addMessageToUI(msg.sender, msg.text, msg.image, msg.file_name, msg.sender === currentUser));
            });
        }

        function loadGroupHistory(groupID) {
            fetch(`/group_history?group_id=${groupID}`).then(res => res.json()).then(data => {
                if(data) data.forEach(msg => addMessageToUI(msg.username, msg.text, msg.image, msg.file_name, msg.username === currentUser));
            });
        }

        function loadGroups() {
            fetch(`/groups?username=${currentUser}`).then(res => res.json()).then(data => {
                var list = document.getElementById('groups_list'); list.innerHTML = '';
                if(data) {
                    data.forEach(group => {
                        var div = document.createElement('div');
                        div.className = 'group-item';
                        div.innerHTML = '<span class="icon">👥</span>' + group.name;
                        div.onclick = function(e) { switchToGroup(group.id, group.name); };
                        list.appendChild(div);
                    });
                }
            });
        }

        function loadAvailableGroups() {
            fetch(`/available_groups?username=${currentUser}`).then(res => res.json()).then(data => {
                var list = document.getElementById('available_groups_list'); list.innerHTML = '';
                if(data) {
                    data.forEach(group => {
                        var div = document.createElement('div');
                        div.className = 'group-item';
                        div.innerHTML = '<span class="icon"></span>' + group.name + ' <button onclick="joinGroup(' + group.id + ')" style="margin-left:auto; background:#28a745; color:white; border:none; padding:3px 8px; border-radius:3px; cursor:pointer;">Вступить</button>';
                        list.appendChild(div);
                    });
                }
            });
        }

        function showCreateGroupModal() { document.getElementById('create_group_modal').classList.remove('hidden'); }
        function hideCreateGroupModal() {
            document.getElementById('create_group_modal').classList.add('hidden');
            document.getElementById('group_name_input').value = '';
        }

        function createGroup() {
            var name = document.getElementById('group_name_input').value.trim();
            if (!name) { alert('Введите название группы'); return; }
            fetch('/create_group', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, creator: currentUser })
            }).then(res => res.json()).then(data => {
                if (data.success) { hideCreateGroupModal(); loadGroups(); loadAvailableGroups(); }
                else { alert(data.message || 'Ошибка создания группы'); }
            });
        }

        function joinGroup(groupID) {
            fetch('/join_group', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ group_id: groupID, username: currentUser })
            }).then(res => res.json()).then(data => {
                if (data.success) { loadGroups(); loadAvailableGroups(); }
                else { alert(data.message || 'Ошибка вступления'); }
            });
        }

        function updateUserList(users) {
            var list = document.getElementById('online_users_list'); list.innerHTML = '';
            var others = users.filter(u => u !== currentUser);
            document.getElementById('online_count').textContent = others.length;
            
            others.forEach(function(username) {
                var div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = '<span class="status"></span>' + username + 
                                '<button class="call-btn" onclick="startCall(\'' + username + '\', event)">📹</button>';
                div.onclick = function() { switchToPrivate(username); };
                list.appendChild(div);
            });
        }

        function addMessageToUI(username, text, image, fileName, isOwn) {
            var div = document.createElement('div');
            div.className = 'message' + (isOwn ? ' own' : '');
            var content = '<div class="meta">' + username + '</div><div class="bubble">';
            if (fileName) {
                content += '<div class="file-container"><span class="file-icon">📄</span><div class="file-info"><span class="file-name">' + fileName + '</span><a href="' + image + '" download="' + fileName + '" class="file-download">Скачать</a></div></div>';
            } else if (image) {
                content += '<img src="' + image + '" onclick="window.open(this.src)">';
            }
            if (text) { content += text; }
            content += '</div>';
            div.innerHTML = content;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            var div = document.createElement('div');
            div.className = 'message system';
            div.innerHTML = '<div class="bubble">' + text + '</div>';
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleTyping() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'typing', username: currentUser }));
            }
        }

        function handleFileSelect(event) {
            var file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { alert('Файл слишком большой! Максимум 5 МБ.'); return; }
            
            var reader = new FileReader();
            reader.onload = function(e) {
                var base64 = e.target.result;
                var isImage = file.type.startsWith('image/');
                var msg = { text: '', image: base64, file_name: isImage ? '' : file.name };
                
                if (currentChat === 'general') msg.type = 'message';
                else if (currentChat === 'group') { msg.type = 'group_message'; msg.group_id = currentGroupID; }
                else { msg.type = 'private'; msg.receiver = currentChat; }
                
                socket.send(JSON.stringify(msg));
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function sendMessage() {
            var input = document.getElementById('msg_input');
            if (input.value.trim() !== '') {
                var msg = { text: input.value };
                if (currentChat === 'general') msg.type = 'message';
                else if (currentChat === 'group') { msg.type = 'group_message'; msg.group_id = currentGroupID; }
                else { msg.type = 'private'; msg.receiver = currentChat; }
                socket.send(JSON.stringify(msg));
                input.value = '';
            }
        }

        // ==================== WEBRTC ЛОГИКА (ПОЛНОСТЬЮ ПЕРЕПИСАНА) ====================

        async function getMediaStream(facingMode = 'user') {
            const constraints = {
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true
                },
                video: {
                    facingMode: facingMode,
                    width: { ideal: 1280, max: 1920 },
                    height: { ideal: 720, max: 1080 },
                    frameRate: { ideal: 30, max: 60 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log('Получен поток с треками:', stream.getTracks().map(t => t.kind));
                return stream;
            } catch (err) {
                console.warn('Не удалось получить поток с facingMode:', facingMode, err);
                // Fallback: пробуем без facingMode
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    console.log('Получен поток без facingMode:', stream.getTracks().map(t => t.kind));
                    return stream;
                } catch (err2) {
                    console.error('Не удалось получить поток вообще:', err2);
                    throw err2;
                }
            }
        }

        async function startCall(targetUsername, event) {
            if(event) event.stopPropagation();
            currentCallTarget = targetUsername;
            currentFacingMode = 'user';
            console.log('=== НАЧИНАЕМ ЗВОНОК === с', targetUsername);

            try {
                // Получаем медиа поток
                localStream = await getMediaStream(currentFacingMode);
                console.log('Локальный поток получен, треки:', localStream.getTracks().length);
                
                // Показываем локальное видео
                const localVideo = document.getElementById('local_video');
                localVideo.srcObject = localStream;
                
                // Принудительно запускаем воспроизведение (важно для мобильных)
                localVideo.play().catch(e => console.log('Autoplay prevented:', e));
                
                document.getElementById('active_call_modal').classList.remove('hidden');

                // Настраиваем peer connection
                await setupPeerConnection();

                // Создаём offer
                const offer = await peerConnection.createOffer({
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: true
                });
                await peerConnection.setLocalDescription(offer);
                console.log('Offer создан, тип SDP:', offer.type);

                // Отправляем offer
                socket.send(JSON.stringify({
                    type: 'webrtc',
                    receiver: currentCallTarget,
                    payload: JSON.stringify({ type: 'offer', sdp: offer })
                }));
                
                console.log('Offer отправлен');
            } catch (err) {
                console.error('Ошибка при начале звонка:', err);
                alert('Не удалось получить доступ к камере/микрофону: ' + err.message);
                endCall();
            }
        }

        async function setupPeerConnection() {
            peerConnection = new RTCPeerConnection(servers);
            pendingCandidates = [];
            
            console.log('Настройка PeerConnection...');
            
            // Добавляем все треки из локального потока
            localStream.getTracks().forEach(track => {
                console.log('Добавляем трек:', track.kind, 'label:', track.label);
                const sender = peerConnection.addTrack(track, localStream);
                console.log('Трек добавлен, sender:', sender);
            });

            // Обработка ICE кандидатов
            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    console.log('ICE кандидат:', event.candidate.candidate.substring(0, 50) + '...');
                    socket.send(JSON.stringify({
                        type: 'webrtc',
                        receiver: currentCallTarget,
                        payload: JSON.stringify({ type: 'ice_candidate', candidate: event.candidate })
                    }));
                } else {
                    console.log('ICE сборка завершена');
                }
            };

            // Обработка входящих треков (ВИДЕО СОБЕСЕДНИКА)
            peerConnection.ontrack = event => {
                console.log('=== ПОЛУЧЕН ТРЕК ===', event.track.kind);
                console.log('Streams:', event.streams.length);
                
                const remoteVideo = document.getElementById('remote_video');
                
                if (event.streams && event.streams[0]) {
                    console.log('Используем stream из события');
                    remoteVideo.srcObject = event.streams[0];
                } else {
                    console.log('Создаём новый MediaStream');
                    const stream = new MediaStream([event.track]);
                    remoteVideo.srcObject = stream;
                }
                
                // Принудительно запускаем воспроизведение
                remoteVideo.play().then(() => {
                    console.log('Remote видео воспроизводится');
                }).catch(e => {
                    console.error('Не удалось воспроизвести remote видео:', e);
                    // Для iOS Safari иногда нужно кликнуть
                    remoteVideo.muted = true;
                    remoteVideo.play().catch(e2 => console.error('Всё равно не работает:', e2));
                });
            };

            // Мониторинг состояния соединения
            peerConnection.onconnectionstatechange = () => {
                console.log('Состояние соединения:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'failed') {
                    console.error('Соединение не удалось');
                    alert('Не удалось установить соединение. Попробуйте ещё раз.');
                    endCall();
                } else if (peerConnection.connectionState === 'disconnected') {
                    console.log('Соединение разорвано');
                }
            };

            peerConnection.oniceconnectionstatechange = () => {
                console.log('ICE состояние:', peerConnection.iceConnectionState);
            };

            peerConnection.onnegotiationneeded = () => {
                console.log('Требуется переговоры');
            };
        }

        async function handleWebRTCSignal(data) {
            const payload = JSON.parse(data.payload);
            const sender = data.username;
            console.log('=== ПОЛУЧЕН СИГНАЛ ===', payload.type, 'от', sender);

            if (payload.type === 'offer') {
                currentCallTarget = sender;
                document.getElementById('incoming_call_text').textContent = sender + ' звонит вам...';
                document.getElementById('incoming_call_modal').classList.remove('hidden');
                window.pendingOffer = payload.sdp;
                console.log('Offer сохранён, ждём принятия');
            } 
            else if (payload.type === 'answer') {
                if (peerConnection) {
                    console.log('Устанавливаем remote description (answer)');
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.sdp));
                    console.log('Remote description установлен');
                    
                    // Применяем накопленные ICE кандидаты
                    console.log('Применяем', pendingCandidates.length, 'накопленных ICE кандидатов');
                    for (const candidate of pendingCandidates) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                        } catch (err) {
                            console.error('Ошибка ICE кандидата:', err);
                        }
                    }
                    pendingCandidates = [];
                }
            } 
            else if (payload.type === 'ice_candidate') {
                if (peerConnection && peerConnection.remoteDescription) {
                    try {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(payload.candidate));
                    } catch (err) {
                        console.error('Ошибка ICE кандидата:', err);
                    }
                } else {
                    console.log('Накапливаем ICE кандидат (remote description ещё не установлен)');
                    pendingCandidates.push(payload.candidate);
                }
            }
            else if (payload.type === 'end_call') {
                console.log('Получен сигнал завершения звонка');
                alert('Звонок завершен пользователем ' + sender);
                endCall();
            }
        }

        async function acceptCall() {
            document.getElementById('incoming_call_modal').classList.add('hidden');
            console.log('=== ПРИНИМАЕМ ЗВОНОК === от', currentCallTarget);
            currentFacingMode = 'user';
            
            try {
                // Получаем медиа поток
                localStream = await getMediaStream(currentFacingMode);
                console.log('Локальный поток получен');
                
                const localVideo = document.getElementById('local_video');
                localVideo.srcObject = localStream;
                localVideo.play().catch(e => console.log('Autoplay prevented:', e));
                
                document.getElementById('active_call_modal').classList.remove('hidden');

                // Настраиваем peer connection
                await setupPeerConnection();

                // Устанавливаем remote description (offer от звонящего)
                console.log('Устанавливаем remote description (offer)');
                await peerConnection.setRemoteDescription(new RTCSessionDescription(window.pendingOffer));
                console.log('Remote description установлен');
                
                // Создаём answer
                const answer = await peerConnection.createAnswer({
                    offerToReceiveAudio: true,
                    offerToReceiveVideo: true
                });
                await peerConnection.setLocalDescription(answer);
                console.log('Answer создан и установлен');

                // Отправляем answer
                socket.send(JSON.stringify({
                    type: 'webrtc',
                    receiver: currentCallTarget,
                    payload: JSON.stringify({ type: 'answer', sdp: answer })
                }));
                
                console.log('Answer отправлен');
            } catch (err) {
                console.error('Ошибка при принятии звонка:', err);
                alert('Ошибка при принятии звонка: ' + err.message);
                rejectCall();
            }
        }

        async function switchCamera() {
            if (!localStream) return;
            
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            console.log('Переключаем камеру на:', currentFacingMode);
            
            try {
                const newStream = await getMediaStream(currentFacingMode);
                const videoTrack = newStream.getVideoTracks()[0];
                
                const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) {
                    await sender.replaceTrack(videoTrack);
                    console.log('Видео трек заменён');
                }
                
                localStream.getVideoTracks().forEach(track => track.stop());
                localStream = newStream;
                document.getElementById('local_video').srcObject = newStream;
                
            } catch (err) {
                console.error('Ошибка переключения камеры:', err);
                alert('Не удалось переключить камеру: ' + err.message);
            }
        }

        function rejectCall() {
            document.getElementById('incoming_call_modal').classList.add('hidden');
            socket.send(JSON.stringify({
                type: 'webrtc',
                receiver: currentCallTarget,
                payload: JSON.stringify({ type: 'end_call' })
            }));
        }

        function endCall() {
            console.log('=== ЗАВЕРШАЕМ ЗВОНОК ===');
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            document.getElementById('active_call_modal').classList.add('hidden');
            document.getElementById('local_video').srcObject = null;
            document.getElementById('remote_video').srcObject = null;

            if (currentCallTarget) {
                socket.send(JSON.stringify({
                    type: 'webrtc',
                    receiver: currentCallTarget,
                    payload: JSON.stringify({ type: 'end_call' })
                }));
            }
            currentCallTarget = '';
            pendingCandidates = [];
        }
    </script>
